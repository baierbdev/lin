services:
  server:
    image: pontto4/lin
    build: 
    context: .
    container_name: lin-api
    restart: on-failure:3
    env_file: .env
    enviroment:
      PNCP_URL: ${PNCP_URL}
      DB_POSTGRES: ${DB_POSTGRES}
    ports: 
      - 8080:8080
    volumes:
      - data:/app/data

  postgres:
    image: postgres:18.4
    container_name: lin-db
    restart: always
    env_file: .env
    enviroment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", ${POSTGRES_DB}]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s
    ports:
      - 5432:5432
    volumes:
      - db:/var/lib/postgresql

volumes:
  - db:
  - data:
