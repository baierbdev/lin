services:
  server:
    image: pontto4/lin
    build: 
      context: .
    container_name: lin-api
    restart: on-failure:3
    env_file:
      - .env
    environment:
      PNCP_URL: ${PNCP_URL}
      DB_POSTGRES: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    ports: 
      - 8080:8080
    volumes:
      - data:/app/data

  postgres:
    image: postgres:17
    container_name: lin-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s
    ports:
      - 5432:5432
    volumes:
      - db:/var/lib/postgresql/data

volumes:
  db:
  data:
